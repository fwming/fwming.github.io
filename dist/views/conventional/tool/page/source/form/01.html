<div class="form-box">
    <div class="title" style="padding-bottom: 24px;">欢迎注册会员</div>
    <div class="form-item">
        <label for="lastname">姓氏</label>
        <div class="input-group">
            <div class="input-box">
                <input id="lastname" type="text" placeholder="姓氏">
            </div>
            <div class="error-msg">请输入您的姓氏</div>
        </div>
    </div>
    <div class="form-item">
        <label for="firstname">名字</label>
        <div class="input-group">
            <div class="input-box">
                <input id="firstname" type="text" placeholder="名字">
            </div>
            <div class="error-msg">请输入您的名字</div>
        </div>
    </div>
    <div class="form-item">
        <label for="gender">性别</label>
        <div class="input-group">
            <div class="input-box">
                <select name="" id="gender">
                    <option value="请选择性别">请选择性别</option>
                    <option value="男">男</option>
                    <option value="女">女</option>
                </select>
            </div>
            <div class="error-msg">请输入您的性别</div>
        </div>
    </div>
    <div class="form-item">
        <label for="email">邮箱</label>
        <div class="input-group">
            <div class="input-box">
                <input id="email" type="text" placeholder="邮箱">
            </div>
            <div class="error-msg">请输入您的电子邮箱</div>
        </div>
    </div>
    <div class="form-item">
        <label for="phone">手机号码</label>
        <div class="input-group">
            <div class="input-box">
                <select name="" id="areaCode">
                    <option value="86">86</option>
                    <option value="852">852</option>
                </select>
                <input id="phone" style="flex: 1;" type="text" placeholder="手机号码">
            </div>
            <div class="error-msg">请输入您的手机号码</div>
        </div>
    </div>
    <div class="form-item tnc">
        <input id="tnc" type="checkbox">
        <div class="input-group">
            <div class="input-box">
                <label for="tnc">一套纯静态的 HTML 网页界面模板，以开源免费的 Layui 基础组件和页面模板 Demo 为组成，没有任何后端程序及数据库存储等服务端代码。</label>
            </div>
            <div class="error-msg">请同意协议内容</div>
        </div>
    </div>
    <div class="btn">提交</div>

</div>
