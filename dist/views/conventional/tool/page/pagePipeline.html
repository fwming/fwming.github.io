<style>

    .logo1 img{display: block;width: 30%;max-width: 136px;}
    /* logo2 */

    .logo2 img{display: block;width: 30%;max-width: 136px;}
    .logo2 .language{display: flex;justify-content: center;align-items: center;position: absolute;right: 20px;font-size: 12px;}
    /* logo3 */
    .logo3{display: flex;justify-content: left;align-items: center;padding: 16px 20px;}
    .logo3 img{display: block;width: 30%;max-width: 136px;}
    .logo3 .language{display: flex;justify-content: center;align-items: center;position: absolute;right: 20px;font-size: 12px;}
    /* banner */
    .banner{display: block;width: 100%;}
    .banner img{display: block;width: 100%;}
    /* swiper */
    .swiper-slide img{display: block;width: 100%;}
    /* video */
    video{display: block;width: 100%;}
    /* txt */
    .paragraph{padding: 16px;}
    /* txt-img-left */
    .img-txt-box1{display: flex;justify-content: space-between;padding-bottom: 16px;}
    .img-txt-box1:nth-of-type(2n){flex-flow: row-reverse;}
    .img-txt-box1>div{width: 50%;box-sizing: border-box;}
    .img-txt-box1>div img,
    .img-txt-box2>div img{display: block;width: 100%;}
    .img-txt-box1 .txt-box,
    .img-txt-box2 .txt-box{display: flex;flex-direction: column;justify-content: center;}
    /* txt-img-top */
    .img-txt-box2{display: flex;justify-content: space-between;padding: 0 16px 16px;}
    .img-txt-box2>div{width: 32%;box-sizing: border-box;border: 1px solid #ccc;border-radius: 8px;overflow: hidden;margin-bottom: 16px;}
    /* form */
    .form-box{width: 100%;max-width: 600px;margin: 0 auto;padding: 0 16px 32px;}
    .form-item{display: flex;align-items: center;padding-bottom: 30px;}
    .form-item label{width: 80px;text-align: right;padding-right: 10px;font-size: 14px;}
    .form-item .input-group{position: relative;flex: 1;}
    .form-item .input-group input,
    .form-item .input-group select{display: block;width: 100%;outline: none;border: none;font-size: 14px;line-height: 1.5em;padding: 8px 10px;box-sizing: border-box;color: #666;}
    ::placeholder{color: #666;}
    .form-item .input-group select{padding: 10px 6px 9px;}
    .form-item .input-group .input-box{display: flex;align-items: center;border-bottom: 1px solid #ccc;}
    .form-item #areaCode{width: 60px;}
    .form-item .input-group .error-msg{position: absolute;left: 3px;bottom: -16px;font-size: 12px;line-height: 1em;color: red;display: none;}
    /* form-tnc */
    .form-item.tnc{align-items: flex-start;}
    .form-item.tnc label{flex: 1;font-size: 14px;line-height: 1.5em;text-align: left;}
    .form-item.tnc input{display: block;width: 18px;height: 18px;margin-left: 50px;margin-right: 10px;}
    .form-item.tnc .input-box{align-items: flex-start;border: none;}



    
    @keyframes breathing {
        0% { transform: scale(1); }
        50% { transform: scale(1.05); }
        100% { transform: scale(1); }
    }

    .loading-button {
        animation: breathing 3s infinite; /* 无限循环呼吸效果 */
    }



    @media screen and (max-width: 640px) {
        .img-txt-box1,.img-txt-box2{display: block;}
        .img-txt-box1>div,.img-txt-box2>div{width: 100%;}
    }
</style>

<script type="text/javascript">
layui.use(['element', 'layer', 'copy'], function(){
    var element = layui.element,
        copy = layui.copy;
        layer = layui.layer;
    element.render('collapse', 'filter-collapse');

    // 被拖拽区域目标
    $('.sortable>div').draggable({
        cursor: 'move',
        connectToSortable: '#look',
        // helper: 'clone',
        helper: function(event, ui){
            return '<div style="background: #faf;width: 150px;height: 60px;">'+event.currentTarget.innerHTML+'</div>'
        },
        revert: 'invalid',
    });
    // 放置区域
    $("#look").sortable({
        receive: function(event, ui) {
            // 标记有新元素加入
            $(this).data('newItem', true);
        },
        update: function(event, ui) {
            console.log(event, ui)
            // 检查标记，确保只对新加入的元素生效
            if ($(this).data('newItem')) {
                // 根据target属性通过ajax获取对应的源码并替换
                $.ajax({
                    type: "get",
                    url: "./dist/views/conventional/tool/page/source/"+ui.item.attr('target')+'.html',
                    async: false,
                    dataType: 'html',
                    success: function(e) {
                        // 修改新放入的元素内容
                        // ui.item.replaceWith('<div>'+e+'</div>');
                        ui.item.replaceWith(e);
                        $(this).data('newItem', false); // 重置标记
                    }
                })
            }
        }
    });
    // 小眼睛预览
    $('.sortable>div i').click(function(){
        $.ajax({
            type: 'get',
            url: "./dist/views/conventional/tool/page/source/"+$(this).parent().attr('target')+'.html',
            saync: false,
            dataType: 'html',
            success: function(e){
                layer.open({
                    type: 1, // page 层类型
                    area: ['500px', '300px'],
                    title: '预览',
                    shade: 0.6, // 遮罩透明度
                    shadeClose: true, // 点击遮罩区域，关闭弹层
                    maxmin: true, // 允许全屏最小化
                    anim: 0, // 0-6 的动画形式，-1 不开启
                    content: e, //放置加载过来的内容e
                });
            }
        })
    })
    // 鼠标进入或离去时显示或隐藏操作列表
    $('.look').on('mouseenter', '>div', function(e){
        $(this).append('<div class="tips"><i class="layui-icon layui-icon-delete"></i></div>');
    }).on('mouseleave', '>div', function(){
        $('.tips').remove();
    })
    // 删除项
    $('.look').on('click','.tips>i.layui-icon-delete', function(){
        layer.msg('成功删除');
        $(this).parent().parent().remove();
    })

    // 复制
    $('.copy-btn').click(function(){
        layer.msg("复制简体版源码成功");
        var source = $('#look').html();
        copy.copyFn(source);
    });


})
</script>
